<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone → Brain → Network</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  color: #111;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 1.2s ease, transform 1.2s ease;
  opacity: 0;
  transform: translateY(40px);
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

.box {
  background: #f7f7f7;
  padding: 60px;
  border-radius: 12px;
  max-width: 700px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

h1 {
  font-size: 42px;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

p {
  font-size: 20px;
  line-height: 1.8;
  color: #555;
}

/* 타자기 효과 */
.typewriter {
  border-right: 2px solid #000;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
}
</style>
</head>

<body>

<div class="hero">
  <div class="box">
    <h1>STONE</h1>
    <p class="typewriter" data-text="The origin of cognition. Matter before mind."></p>
  </div>
</div>

<div class="hero">
  <div class="box">
    <h1>BRAIN</h1>
    <p class="typewriter" data-text="Neural expansion. Consciousness emerges."></p>
  </div>
</div>

<div class="hero">
  <div class="box">
    <h1>NETWORK</h1>
    <p class="typewriter" data-text="Human and AI connected. Perception extended."></p>
  </div>
</div>

<script>
// 스크롤 애니메이션
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      entry.target.classList.add('visible');
      typeEffect(entry.target.querySelector('.typewriter'));
    }
  });
}, { threshold: 0.3 });

sections.forEach(section => {
  observer.observe(section);
});

// 타자기 효과
function typeEffect(element) {
  if (!element) return;
  let text = element.getAttribute("data-text");
  element.textContent = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }

  typing();
}
</script>

</body>
</html>
