<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolbag001 Emotion OS</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  color: #111;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 40px;
}

.container {
  width: 420px;
  text-align: left;
  transition: opacity 0.5s ease;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
  font-weight: 600;
}

.option {
  margin: 8px 0;
  cursor: pointer;
  padding: 6px 0;
  transition: opacity 0.3s;
}

.option:hover {
  opacity: 0.5;
}

.center-text {
  text-align: center;
  line-height: 1.8;
  font-size: 16px;
}

/* 로딩 스피너 */
.spinner {
  border: 4px solid #eee;
  border-top: 4px solid #111;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="logo">Dolbag001</div>
<div class="container" id="app"></div>

<script>

const app = document.getElementById("app");

const emotions = [
"1 Joy / 기쁨",
"2 Sadness / 슬픔",
"3 Loneliness / 외로움",
"4 Anger / 분노",
"5 Anxiety / 불안",
"6 Love / 사랑",
"7 Doubt / 의심",
"8 Excitement / 설렘",
"9 Boredom / 지루함"
];

const needs = [
"1 Comfort / 위로",
"2 Motivation / 동기",
"3 Focus / 집중",
"4 Rest / 휴식",
"5 Recognition / 인정",
"6 Connection / 연결"
];

let step = 0;

function renderQuestion() {

app.innerHTML = "";

let questionText = "";
let options = [];

if(step === 0){
questionText = `
<div class="question">
Q1<br>
How do you feel today?<br>
오늘 당신의 감정은 무엇입니까?
</div>`;
options = emotions;
}
else if(step === 1){
questionText = `
<div class="question">
Q2<br>
Which emotion would you like to maintain?<br>
유지하고 싶은 감정은 무엇입니까?
</div>`;
options = emotions;
}
else if(step === 2){
questionText = `
<div class="question">
Q3<br>
What do you need most right now?<br>
지금 가장 필요한 것은 무엇입니까?
</div>`;
options = needs;
}

app.innerHTML += questionText;

options.forEach(opt => {
const div = document.createElement("div");
div.className = "option";
div.innerText = opt;
div.onclick = nextStep;
app.appendChild(div);
});
}

function nextStep(){
step++;
if(step < 3){
renderQuestion();
}else{
showLoading();
}
}

function showLoading(){

app.innerHTML = `
<div class="center-text">
<div class="spinner"></div>
Cross-analyzing emotional vectors...<br>
감정 벡터 교차 분석 중...
</div>
`;

setTimeout(()=>{
app.innerHTML += `
<br>
Converging outputs...<br>
출력값 수렴 중...
`;
},1500);

setTimeout(()=>{
showResult();
},3000);
}

function showResult(){
app.innerHTML = `
<div class="center-text">
<strong>Result / 결과</strong><br><br>

EMOTION STATUS: STABLE<br>
감정 상태: 안정<br><br>

FACE OUTPUT: :-|<br>
출력 표정: 무표정<br><br>

All inputs converge.<br>
모든 입력은 수렴합니다.
</div>
`;
}

renderQuestion();

</script>

</body>
</html>
