<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test your emotion</title>

<style>
body{
  margin:0;
  background:#ffffff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  color:#111;
}
.container{ margin-top:140px; }
.box{
  width:420px;
  min-height:180px;
  border:1px solid #f0f0f0;
  border-radius:22px;
  padding:32px;
  box-shadow:0 30px 80px rgba(0,0,0,0.06);
  backdrop-filter: blur(6px);
  transition:0.4s cubic-bezier(.4,0,.2,1);
}
.start{
  cursor:pointer;
  text-align:center;
  font-size:18px;
}
.option{
  margin:8px 0;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
}
.option:hover{ opacity:0.4; }
.progress-wrap{ margin-top:15px; }
.progress-bar{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:4px;
  overflow:hidden;
}
.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#111,#555);
  transition:width 0.2s ease-out;
}
.percent{
  font-size:12px;
  margin-top:6px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="box start" id="box">
    test your emotion
  </div>
</div>

<script>

const box=document.getElementById("box");

const emotions=[
"Joy / 기쁨","Sadness / 슬픔","Loneliness / 외로움",
"Anger / 분노","Anxiety / 불안","Love / 사랑",
"Doubt / 의심","Excitement / 설렘","Boredom / 지루함"
];

const needs=[
"Comfort / 위로","Motivation / 동기","Focus / 집중",
"Rest / 휴식","Recognition / 인정","Connection / 연결"
];

let step=0;

box.addEventListener("click", start);

function start(){
  box.removeEventListener("click", start);
  step=0;
  render();
}

function render(){

  let q="";
  let options=[];

  if(step===0){
    q="Q1<br>How do you feel today?<br><br>오늘 당신의 감정은 무엇입니까?";
    options=emotions;
  }else if(step===1){
    q="Q2<br>Which emotion would you like to maintain?<br><br>오늘 유지하고 싶은 감정은 무엇입니까?";
    options=emotions;
  }else{
    q="Q3<br>What do you need most right now?<br><br>지금 가장 필요한 것은 무엇입니까?";
    options=needs;
  }

  box.classList.remove("start");
  box.innerHTML = `<div style="margin-bottom:16px;">${q}</div>`;

  options.forEach(opt=>{
    const d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>{
      step++;
      if(step<3){
        render();
      }else{
        load();
      }
    };
    box.appendChild(d);
  });
}

function load(){

  box.innerHTML=`
  AI analyzing...<br>
  감정 데이터 분석 중...
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress" id="bar"></div>
    </div>
    <div class="percent" id="percent">0%</div>
  </div>
  `;

  let p=0;
  const bar=document.getElementById("bar");
  const percent=document.getElementById("percent");

function animate(){

  if(p < 54){

    let speed;
    let delay;

    if(p < 20){
      speed = 3.5;
      delay = 60;
    }
    else if(p < 40){
      speed = 1.8;
      delay = 90;
    }
    else{
      speed = 0.5;
      delay = 140;
    }

    p += speed;

    bar.style.width = p + "%";
    percent.innerText = Math.floor(p) + "%";

    setTimeout(animate, delay);

  }else{

    bar.style.width = "54%";
    percent.innerText = "54%";

    setTimeout(result, 1200);
  }
}

  animate();
}

function result(){

  box.innerHTML = `

  <div style="font-size:12px;letter-spacing:1px;opacity:0.5;">
    EMOTION STATUS / 감정 상태
  </div>

  <div style="margin-top:6px;font-size:18px;margin-bottom:28px;">
    Stable / 안정
  </div>

  <div style="display:flex;align-items:center;gap:24px;">

    <img src="einstein.png"
         style="
         width:120px;
         filter:grayscale(100%);
         opacity:0.92;
         ">

    <div>
      <div style="font-size:12px;letter-spacing:1px;opacity:0.5;">
        FACE OUTPUT / 출력 표정
      </div>

      <div style="margin-top:8px;font-size:16px;">
        AI Emotional Reflection<br>
        감정 반영 결과
      </div>
    </div>

  </div>

  <div id="restartBtn"
       style="
       margin-top:36px;
       font-size:12px;
       opacity:0.35;
       cursor:pointer;
       letter-spacing:1px;
       ">
    RESTART / 다시 시작
  </div>

  `;

  document.getElementById("restartBtn").onclick = function(){
    box.classList.add("start");
    box.innerHTML = "Test your emotion";
    box.addEventListener("click", start);
  };
}

</script>

</body>
</html>
