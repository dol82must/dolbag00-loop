<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test your emotion</title>

<style>
body{
  margin:0;
  background:#ffffff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  color:#111;
}

/* 위로 살짝 올리기 */
.container{
  margin-top:140px;
}

/* 박스 디자인 고급화 */
.box{
  width:420px;
  min-height:160px;
  border:1px solid #e5e5e5;
  border-radius:18px;
  padding:28px;
  box-shadow:0 10px 40px rgba(0,0,0,0.05);
  transition:0.3s;
}

.start{
  cursor:pointer;
  text-align:center;
  font-size:18px;
  letter-spacing:0.5px;
}

.start:hover{
  transform:translateY(-2px);
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

.option{
  margin:8px 0;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
}

.option:hover{
  opacity:0.4;
}

.progress-wrap{
  margin-top:15px;
}

.progress-bar{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:4px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:#111;
}

.percent{
  font-size:12px;
  margin-top:6px;
  opacity:0.5;
}
</style>
</head>
<body>

<script>

const box=document.getElementById("box");

const emotions=[
  
"Joy / 기쁨","Sadness / 슬픔","Loneliness / 외로움",
"Anger / 분노","Anxiety / 불안","Love / 사랑",
"Doubt / 의심","Excitement / 설렘","Boredom / 지루함"
  
];

const needs=[
  
"Comfort / 위로","Motivation / 동기","Focus / 집중",
"Rest / 휴식","Recognition / 인정","Connection / 연결"
  
];

let step=0;

<div onclick="location.href='emotion-popup.html'">
  Test your emotion
</div>

function start(){
  step=0;
  render();
}

function render(){

  let q="";
  let options=[];

  if(step===0){
    q="Q1<br>How do you feel today?<br><br>오늘 당신의 감정은 무엇입니까?";
    options=emotions;
  }else if(step===1){
    q="Q2<br>Which emotion would you like to maintain?<br><br>오늘 유지하고 싶은 감정은 무엇입니까?";
    options=emotions;
  }else{
    q="Q3<br>What do you need most right now?<br><br>지금 가장 필요한 것은 무엇입니까?";
    options=needs;
  }

  box.classList.remove("start");
  box.innerHTML=q;

  options.forEach(opt=>{
    const d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>{
      step++;
      if(step<3){
        render();
      }else{
        load();
      }
    };
    box.appendChild(d);
  });
}

function load(){

  box.innerHTML=`
  AI analyzing...<br>
  감정 데이터 분석 중...
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress" id="bar"></div>
    </div>
    <div class="percent" id="percent">0%</div>
  </div>
  `;

  let p=0;
  const bar=document.getElementById("bar");
  const percent=document.getElementById("percent");

  function animate(){

    if(p<54){

      let speed;

      if(p<20){ speed=4; }
      else if(p<40){ speed=2; }
      else{ speed=0.6; }

      p+=speed;

      bar.style.width=p+"%";
      percent.innerText=Math.floor(p)+"%";

      setTimeout(animate,80);

    }else{

      bar.style.width="54%";
      percent.innerText="54%";

      setTimeout(result,1000);
    }
  }

  animate();
}

function result(){

  box.innerHTML=`
  Result / 결과<br><br>
  EMOTION STATUS: STABLE<br>
  감정 상태: 안정<br><br>
  FACE OUTPUT: :-|<br>
  출력 표정: 무표정<br><br>
  <div style="margin-top:20px;font-size:12px;opacity:0.5;cursor:pointer;">
  Restart
  </div>
  `;

  box.querySelector("div").onclick=start;
}

<script>
alert("JS CONNECTED");
</script>
</body>
</html>
