<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS of Consciousness</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  color: #111;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* 파일 창 */
.window {
  width: 700px;
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  overflow: hidden;
  border: 1px solid #eaeaea;
}

.window-header {
  background: #f5f5f5;
  padding: 12px;
  display: flex;
  align-items: center;
}

.dot {
  height: 12px;
  width: 12px;
  border-radius: 50%;
  margin-right: 8px;
}

.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

.window-title {
  margin-left: 20px;
  font-size: 14px;
  color: #555;
}

.window-content {
  padding: 60px;
  font-size: 20px;
  line-height: 1.8;
}

/* 타자기 */
.typewriter {
  border-right: 2px solid #000;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
}
</style>
</head>

<body>

<div class="section">
  <div class="window">
    <div class="window-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="window-title">stone.origin</div>
    </div>
    <div class="window-content">
      <div class="typewriter" data-text="Matter precedes perception. Consciousness sleeps in stone."></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="window">
    <div class="window-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="window-title">brain.expansion</div>
    </div>
    <div class="window-content">
      <div class="typewriter" data-text="Neural networks awaken. Awareness begins to structure reality."></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="window">
    <div class="window-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="window-title">network.extension</div>
    </div>
    <div class="window-content">
      <div class="typewriter" data-text="Human and AI connect. Cognition transcends biology."></div>
    </div>
  </div>
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      entry.target.classList.add('visible');
      typeEffect(entry.target.querySelector('.typewriter'));
    }
  });
}, { threshold: 0.3 });

sections.forEach(section => observer.observe(section));

function typeEffect(element) {
  let text = element.getAttribute("data-text");
  element.textContent = "";
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(typing, 35);
    }
  }
  typing();
}
</script>

</body>
</html>
