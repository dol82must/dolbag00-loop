<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion System</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#ffffff;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  color:#111;
}

/* 상단 메뉴 */
.top{
  margin-top:40px;
  text-align:center;
  font-size:14px;
  opacity:0.6;
}

/* Test box 위치 */
.wrapper{
  margin-top:120px;   /* ← 여기서 위/아래 조절 가능 */
}

/* 네모 박스 */
.test-box{
  width:360px;
  min-height:140px;
  border:1px solid #111;
  border-radius:14px;
  padding:20px;
  transition:0.3s;
}

.start{
  cursor:pointer;
  text-align:center;
}

.start:hover{
  background:#111;
  color:#fff;
}

.option{
  margin:6px 0;
  cursor:pointer;
  opacity:0.8;
  font-size:14px;
}

.option:hover{
  opacity:0.4;
}

.progress-bar{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:4px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:#111;
}

.percent{
  font-size:12px;
  margin-top:6px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="top">
Home<br>
Main Menu
</div>

<div class="wrapper">
  <div class="test-box start" id="box">
    Test your emotion
  </div>
</div>

<script>

const box = document.getElementById("box");

const emotions=[
"Joy / 기쁨","Sadness / 슬픔","Loneliness / 외로움",
"Anger / 분노","Anxiety / 불안","Love / 사랑",
"Doubt / 의심","Excitement / 설렘","Boredom / 지루함"
];

const needs=[
"Comfort / 위로","Motivation / 동기","Focus / 집중",
"Rest / 휴식","Recognition / 인정","Connection / 연결"
];

let step=0;

box.addEventListener("click",startTest);

function startTest(){
  step=0;
  renderQuestion();
}

function renderQuestion(){

  let q="";
  let options=[];

  if(step===0){
    q="Q1<br>How do you feel today?<br>오늘 당신의 감정은 무엇입니까?";
    options=emotions;
  }
  else if(step===1){
    q="Q2<br>Which emotion would you like to maintain?<br>유지하고 싶은 감정은 무엇입니까?";
    options=emotions;
  }
  else{
    q="Q3<br>What do you need most right now?<br>지금 가장 필요한 것은 무엇입니까?";
    options=needs;
  }

  box.classList.remove("start");
  box.innerHTML="<div>"+q+"</div>";

  options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerText=opt;
    div.onclick=()=>{
      step++;
      if(step<3){
        renderQuestion();
      }else{
        startLoading();
      }
    };
    box.appendChild(div);
  });
}

function startLoading(){

  box.innerHTML=`
  AI analyzing...<br>
  감정 데이터 분석 중...
  <div class="progress-bar">
    <div class="progress" id="bar"></div>
  </div>
  <div class="percent" id="percent">0%</div>
  `;

  let p=0;
  const bar=document.getElementById("bar");
  const percent=document.getElementById("percent");

  function animate(){

    if(p<54){

      let speed;

      if(p<15){
        speed=5;      // 빠름
      }else if(p<35){
        speed=2;      // 중간
      }else{
        speed=0.6;    // 느려짐
      }

      p+=speed;

      bar.style.width=p+"%";
      percent.innerText=Math.floor(p)+"%";

      setTimeout(animate,80);

    }else{

      bar.style.width="54%";
      percent.innerText="54%";

      setTimeout(showResult,1200);
    }
  }

  animate();
}

function showResult(){

  box.innerHTML=`
  Result / 결과<br><br>
  EMOTION STATUS: STABLE<br>
  감정 상태: 안정<br><br>
  FACE OUTPUT: :-|<br>
  출력 표정: 무표정<br><br>
  <div style="margin-top:15px; font-size:12px; opacity:0.6; cursor:pointer;">
  Restart
  </div>
  `;

  box.querySelector("div").onclick=startTest;
}

</script>

</body>
</html>
