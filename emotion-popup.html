<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test your emotion</title>

<style>
body{
  margin:0;
  background:#ffffff;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.box{
  width:420px;
  padding:30px;
  border:1px solid #ddd;
  border-radius:20px;
}
.option{
  margin:8px 0;
  cursor:pointer;
}
.option:hover{
  opacity:0.6;
}
.progress-bar{
  width:100%;
  height:6px;
  background:#eee;
  margin-top:15px;
}
.progress{
  height:100%;
  width:0%;
  background:#111;
}
.percent{
  font-size:12px;
  
  margin-top:6px;
}
</style>
</head>

<body>

<div class="box" id="box">
  Test your emotion
</div>

<script>

const box = document.getElementById("box");

/* ===== 9개 감정 ===== */
const emotions=[
"Happy / 행복한",
"Calm / 평온한",
"Anxious / 불안한",
"Angry / 화가 난",
"Sad / 슬픈",
"Excited / 설레는",
"Tired / 피곤한",
"Confused / 혼란스러운",
"Empty / 공허한"
];

const needs=[
"Rest / 휴식",
"Focus / 집중",
"Connection / 연결"
];

let step=0;

box.onclick = function(){
  step=0;
  showQuestion();
};

function showQuestion(){

  let question="";
  let options=[];

  if(step===0){
    question="Q1. How do you feel today?<br>오늘 당신의 감정은 무엇입니까?";
    options=emotions;
  }
  else if(step===1){
    question="Q2. Which emotion to maintain?<br>유지하고 싶은 감정은 무엇입니까?";
    options=emotions;
  }
  else{
    question="Q3. What do you need most right now?<br>지금 가장 필요한 것은 무엇입니까?";
    options=needs;
  }

  box.innerHTML="<div>"+question+"</div>";

  for(let i=0;i<options.length;i++){

    const div=document.createElement("div");
    div.className="option";
    div.innerText=options[i];

    div.onclick=function(e){
      e.stopPropagation();
      step++;
      if(step<3){
        showQuestion();
      }else{
        startLoading();
      }
    };

    box.appendChild(div);
  }
}

function startLoading(){

  box.innerHTML=`
  AI analyzing...<br>
  감정 데이터 처리 중
  <div class="progress-bar">
    <div class="progress" id="bar"></div>
  </div>
  <div class="percent" id="percent">0%</div>
  `;

  function showCompleteScreen(){

  box.innerHTML=`
  감정 분석이 완료되었습니다.<br><br>

  <div id="viewResult" style="
      padding:8px 12px;
      border:1px solid #aaa;
      border-radius:10px;
      display:inline-block;
      cursor:pointer;">
    결과보기
  </div>
  `;

  document.getElementById("viewResult").onclick=function(){
    showResult();
  };

}
  
  let p=0;
  const bar=document.getElementById("bar");
  const percent=document.getElementById("percent");

  function animate(){

    if(p<200){

      let speed;

      if(p<30) speed=4;          // 빠르게 시작
      else if(p<70) speed=2;     // 중간
      else if(p<120) speed=1;    // 느려짐
      else speed=0.5;            // 거의 멈추는 느낌

      p+=speed;

      bar.style.width=(p>100?100:p)+"%";
      percent.innerText=Math.floor(p)+"%";

      setTimeout(animate,60);

    }else{
  bar.style.width="100%";
  percent.innerText="200%";

  setTimeout(showCompleteScreen,1000);
}
  }

  animate();
}

function showResult(){

  box.innerHTML=`
  <strong>Result / 結果</strong><br><br>

  Today, maintain your poker face.<br>
  今日はポーカーフェイスを維持してください。<br><br>

  결과 : 오늘은 포커페이스를 유지하세요.

  <br><br>

  <div id="restart" style="
      margin-top:15px;
      padding:8px 12px;
      border:1px solid #aaa;
      border-radius:10px;
      display:inline-block;
      cursor:pointer;">
    Restart
  </div>
  `;

  document.getElementById("restart").onclick=function(){
    step=0;
    showQuestion();
  };

}

</script>

</body>
</html>
