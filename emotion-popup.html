<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emotion Test</title>

<style>

body{
font-family: Arial, sans-serif;
background:black;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:420px;
margin:auto;
padding:30px;
border:1px solid #aaa;
border-radius:12px;
box-shadow:0 0 15px #d0d0d0;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#444;
}

.start-btn{
border:1px solid silver;
box-shadow:0 0 12px #d0d0d0;
}

.loading{
font-size:20px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="container">

<!-- START SCREEN -->
<div id="startScreen">

<h2>Test your emotion</h2>

<button id="startBtn" class="start-btn">
Start
</button>

</div>


<!-- QUESTION SCREEN -->
<div id="questionScreen" style="display:none">

<h3 id="questionTitle"></h3>

<div id="answers"></div>

</div>


<!-- LOADING SCREEN -->
<div id="loadingScreen" style="display:none">

<div class="loading">
Loading... 54%
</div>

<div style="margin-top:20px;">
감정 분석이 완료되었습니다
</div>

<button id="resultBtn">
결과보기
</button>

</div>


<!-- RESULT SCREEN -->
<div id="resultScreen" style="display:none">

<h3>Result</h3>

<p id="resultText"></p>

<button onclick="restartTest()">
Restart
</button>

</div>

</div>



<script>

let currentQ = 0

const questions = [

{
q:"How do you feel today? / 오늘 당신의 감정은 무엇입니까?",
a:[
"Rest / 휴식",
"Focus / 집중",
"Connection / 연결"
]
},

{
q:"What do you need now? / 지금 필요한 것은?",
a:[
"Hug / 허그",
"Love / 사랑",
"Art / 예술"
]
},

{
q:"What would help your mood? / 기분을 바꾸려면?",
a:[
"Trip / 여행",
"Running / 러닝",
"Snack / 간식"
]
}

]



document.getElementById("startBtn").onclick=function(){

document.getElementById("startScreen").style.display="none"

document.getElementById("questionScreen").style.display="block"

showQuestion()

}



function showQuestion(){

let q = questions[currentQ]

document.getElementById("questionTitle").innerText=q.q

let answersHTML=""

q.a.forEach(a=>{
answersHTML += `<button onclick="nextQuestion()">${a}</button>`
})

document.getElementById("answers").innerHTML=answersHTML

}



function nextQuestion(){

currentQ++

if(currentQ < questions.length){

showQuestion()

}else{

document.getElementById("questionScreen").style.display="none"

document.getElementById("loadingScreen").style.display="block"

}

}



document.getElementById("resultBtn").onclick=function(){

document.getElementById("loadingScreen").style.display="none"

document.getElementById("resultScreen").style.display="block"

document.getElementById("resultText").innerHTML=
"Today keep a poker face.<br><br>今日はポーカーフェイスを保ってください。"

}



function restartTest(){

currentQ=0

document.getElementById("resultScreen").style.display="none"

document.getElementById("startScreen").style.display="block"

}

</script>

</body>
</html>
