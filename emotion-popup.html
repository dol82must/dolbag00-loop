<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolbag001</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:#111;
}

.menu{
  position:absolute;
  top:20px;
  text-align:center;
}

.test-box{
  width:360px;
  border:1px solid #111;
  border-radius:12px;
  padding:20px;
  cursor:pointer;
  transition:0.3s;
}

.test-box:hover{
  background:#111;
  color:#fff;
}

.inner{
  font-size:14px;
  line-height:1.6;
}

.option{
  margin:6px 0;
  cursor:pointer;
  opacity:0.8;
}

.option:hover{
  opacity:0.4;
}

.progress-bar{
  width:100%;
  height:6px;
  background:#eee;
  border-radius:4px;
  margin-top:15px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:#111;
  transition:width 0.2s linear;
}

.small{
  font-size:12px;
  margin-top:8px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="menu">
  Home<br>
  Main Menu
</div>

<div class="test-box" id="box">
  Test your emotion
</div>

<script>

const box = document.getElementById("box");

const emotions = [
"Joy / 기쁨","Sadness / 슬픔","Loneliness / 외로움",
"Anger / 분노","Anxiety / 불안","Love / 사랑",
"Doubt / 의심","Excitement / 설렘","Boredom / 지루함"
];

const needs = [
"Comfort / 위로","Motivation / 동기","Focus / 집중",
"Rest / 휴식","Recognition / 인정","Connection / 연결"
];

let step = 0;

box.onclick = startTest;

function startTest(){
  step = 0;
  renderQuestion();
}

function renderQuestion(){

  let question = "";
  let options = [];

  if(step === 0){
    question = "Q1<br>How do you feel today?<br>오늘 당신의 감정은 무엇입니까?";
    options = emotions;
  }
  else if(step === 1){
    question = "Q2<br>Which emotion would you like to maintain?<br>유지하고 싶은 감정은 무엇입니까?";
    options = emotions;
  }
  else if(step === 2){
    question = "Q3<br>What do you need most right now?<br>지금 가장 필요한 것은 무엇입니까?";
    options = needs;
  }

  box.innerHTML = `<div class="inner">${question}</div>`;

  options.forEach(opt=>{
    const div = document.createElement("div");
    div.className="option";
    div.innerText=opt;
    div.onclick=()=>{
      step++;
      if(step<3){
        renderQuestion();
      }else{
        startLoading();
      }
    };
    box.appendChild(div);
  });
}

function startLoading(){

  box.innerHTML = `
  <div class="inner">
  AI analyzing...<br>
  감정 데이터 분석 중...
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
  <div class="small" id="percent">0%</div>
  </div>
  `;

  let progress = 0;
  const progressEl = document.getElementById("progress");
  const percentEl = document.getElementById("percent");

  function animate(){

    if(progress < 54){

      // 가속 → 감속 효과
      let speed;
      if(progress < 20){
        speed = 4;      // 빠르게
      }else if(progress < 40){
        speed = 2;      // 중간
      }else{
        speed = 0.8;    // 느려짐
      }

      progress += speed;

      progressEl.style.width = progress + "%";
      percentEl.innerText = Math.floor(progress) + "%";

      setTimeout(animate, 80);

    }else{
      progressEl.style.width = "54%";
      percentEl.innerText = "54%";
      showResult();
    }
  }

  animate();
}

function showResult(){
  setTimeout(()=>{
    box.innerHTML = `
    <div class="inner">
    Result / 결과<br><br>
    EMOTION STATUS: STABLE<br>
    감정 상태: 안정<br><br>
    FACE OUTPUT: :-|<br>
    출력 표정: 무표정
    </div>
    `;
  },1200);
}

</script>

</body>
</html>
